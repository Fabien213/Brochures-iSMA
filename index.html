<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>iSMA Controlli — Documentation</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #2153F2;
    --blue-light: #EEF2FF;
    --blue-mid: #B8C8FC;
    --dark: #0D1526;
    --gray: #6B7280;
    --border: #E2E8F5;
    --bg: #F4F7FF;
    --white: #FFFFFF;
    --radius: 14px;
    --tap: 52px;
  }
  html, body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--dark);
    -webkit-font-smoothing: antialiased;
  }
  body {
    min-height: 100vh;
    padding: 24px 16px 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .card {
    background: var(--white);
    border-radius: 20px;
    border: 1px solid var(--border);
    padding: 28px 20px 32px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 2px 24px rgba(33,83,242,0.06);
  }
  .logo-wrap { display: flex; justify-content: center; margin-bottom: 24px; }
  .logo-wrap img { height: 40px; width: auto; }
  h1 { font-size: 18px; font-weight: 600; color: var(--dark); text-align: center; letter-spacing: -0.3px; margin-bottom: 6px; }
  .subtitle { font-size: 11.5px; color: var(--gray); text-align: center; line-height: 1.55; margin-bottom: 24px; }
  .divider { height: 1px; background: var(--border); margin: 20px 0; }
  .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.09em; color: var(--blue); margin-bottom: 12px; }
  .select-actions { display: flex; gap: 8px; margin-bottom: 14px; }
  .select-actions button {
    flex: 1; height: 36px; font-size: 11.5px;
    border: 1.5px solid var(--border); border-radius: 8px;
    background: var(--white); color: var(--gray); cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-weight: 500;
    -webkit-tap-highlight-color: transparent;
  }
  .select-actions button:active { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }
  .products-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
  .product-item {
    display: flex; align-items: center; gap: 14px;
    min-height: var(--tap); padding: 0 16px;
    border: 1.5px solid var(--border); border-radius: var(--radius);
    cursor: pointer; transition: border-color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent; user-select: none;
  }
  .product-item:has(input:checked) { border-color: var(--blue-mid); background: var(--blue-light); }
  .product-item input[type="checkbox"] { position: absolute; opacity: 0; width: 0; height: 0; }
  .checkmark {
    width: 22px; height: 22px; min-width: 22px;
    border: 2px solid var(--border); border-radius: 6px;
    background: var(--white); position: relative;
    transition: all 0.15s; flex-shrink: 0;
  }
  .product-item:has(input:checked) .checkmark { background: var(--blue); border-color: var(--blue); }
  .checkmark::after {
    content: ''; position: absolute;
    top: 3px; left: 6px; width: 6px; height: 10px;
    border: 2.5px solid white; border-top: none; border-left: none;
    transform: rotate(45deg); opacity: 0; transition: opacity 0.15s;
  }
  .product-item:has(input:checked) .checkmark::after { opacity: 1; }
  .product-name { font-size: 15px; font-weight: 400; color: var(--dark); transition: color 0.15s; }
  .product-item:has(input:checked) .product-name { color: var(--blue); font-weight: 500; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 11px; font-weight: 600; color: var(--gray); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.07em; }
  .field input {
    width: 100%; height: var(--tap); padding: 0 16px;
    border: 1.5px solid var(--border); border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif; font-size: 15px;
    color: var(--dark); background: var(--white); outline: none;
    -webkit-appearance: none; transition: border-color 0.15s;
  }
  .field input:focus { border-color: var(--blue); }
  .field input::placeholder { color: #C5CDE0; }

  /* RGPD block */
  .rgpd-block {
    margin: 4px 0 20px;
    padding: 14px 16px;
    background: var(--blue-light);
    border: 1.5px solid var(--blue-mid);
    border-radius: var(--radius);
  }
  .rgpd-label {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .rgpd-label input[type="checkbox"] { position: absolute; opacity: 0; width: 0; height: 0; }
  .rgpd-checkmark {
    width: 22px; height: 22px; min-width: 22px;
    border: 2px solid var(--blue-mid); border-radius: 6px;
    background: var(--white); position: relative;
    transition: all 0.15s; flex-shrink: 0; margin-top: 1px;
  }
  .rgpd-label:has(input:checked) .rgpd-checkmark { background: var(--blue); border-color: var(--blue); }
  .rgpd-checkmark::after {
    content: ''; position: absolute;
    top: 3px; left: 6px; width: 6px; height: 10px;
    border: 2.5px solid white; border-top: none; border-left: none;
    transform: rotate(45deg); opacity: 0; transition: opacity 0.15s;
  }
  .rgpd-label:has(input:checked) .rgpd-checkmark::after { opacity: 1; }
  .rgpd-text { font-size: 12px; color: var(--dark); line-height: 1.55; }
  .rgpd-text a { color: var(--blue); text-decoration: underline; }

  .btn {
    width: 100%; height: 54px; background: var(--blue); color: white;
    border: none; border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600;
    cursor: pointer; letter-spacing: -0.2px;
    -webkit-tap-highlight-color: transparent; margin-top: 4px;
  }
  .btn:active { background: #1A42D8; }
  /* Comment section */
  .themes-wrap { display: flex; flex-wrap: nowrap; gap: 6px; margin-bottom: 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 2px; }
  .theme-chip {
    padding: 5px 8px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    font-size: 10.5px;
    font-family: 'DM Sans', sans-serif;
    color: var(--gray);
    background: var(--white);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .theme-chip.active {
    border-color: var(--blue);
    background: var(--blue-light);
    color: var(--blue);
    font-weight: 500;
  }
  .comment-box {
    width: 100%;
    min-height: 90px;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--dark);
    background: var(--white);
    outline: none;
    resize: vertical;
    -webkit-appearance: none;
    transition: border-color 0.15s;
    line-height: 1.5;
  }
  .comment-box:focus { border-color: var(--blue); }
  .comment-box::placeholder { color: #C5CDE0; }
  .footer-note { font-size: 12px; color: var(--gray); text-align: center; margin-top: 16px; line-height: 1.5; }
  .footer-note strong { color: var(--blue); }
</style>
</head>

    <button type="button" class="theme-chip" onclick="toggleTheme(this, 'Autre')">Autre</button>
  </div>

  <div class="rgpd-block">
    <label class="rgpd-label">
      <input type="checkbox" id="rgpd" checked>
      <span class="rgpd-checkmark"></span>
      <span class="rgpd-text">
        J'accepte de recevoir la <strong>newsletter iSMA Controlli</strong> (nouveautés produits, actualités, événements). Vous pouvez vous désinscrire à tout moment. Vos données sont traitées conformément au <a href="https://www.ismacontrolli.com/en/privacy-policy.html" target="_blank">Règlement Général sur la Protection des Données (RGPD)</a>.
      </span>
    </label>

  <button class="btn" onclick="sendRequest()">✉ Envoyer ma demande</button>
  <p class="footer-note">Votre demande sera transmise à<br><strong>fabien.gatti@ismacontrolli.com</strong></p>
</div>

<script>
  function toggleTheme(el, label) {
    el.classList.toggle('active');
    // Update textarea hint with selected themes
    const active = [...document.querySelectorAll('.theme-chip.active')].map(c => c.textContent);
    const box = document.getElementById('comment');
    if (active.length > 0 && box.value === '') {
      box.placeholder = 'Thème(s) : ' + active.join(', ') + '...';
    } else if (active.length === 0) {
      box.placeholder = 'Ajoutez un commentaire ou précisez votre demande...';
    }
  }
  function selectAll() {
    document.querySelectorAll('input[name="product"]').forEach(cb => cb.checked = true);
  }
  function deselectAll() {
    document.querySelectorAll('input[name="product"]').forEach(cb => cb.checked = false);
  }
  function sendRequest() {
    const checked = [...document.querySelectorAll('input[name="product"]:checked')].map(cb => cb.value);
    if (checked.length === 0) {
      alert('Veuillez sélectionner au moins un document.');
      return;
    }
    const nom = document.getElementById('nom').value.trim();
    const societe = document.getElementById('societe').value.trim();
    const telephone = document.getElementById('telephone').value.trim();
    const rgpd = document.getElementById('rgpd').checked;

    const productList = checked.map(p => '  - ' + p).join('\n');
    let coords = '';
    if (nom || societe || telephone) {
      coords += '\n\nCoordonnées :\n';
      if (nom) coords += 'Nom / Prénom : ' + nom + '\n';
      if (societe) coords += 'Société : ' + societe + '\n';
      if (telephone) coords += 'Téléphone : ' + telephone + '\n';
    }
    const comment = document.getElementById('comment').value.trim();
    const activeThemes = [...document.querySelectorAll('.theme-chip.active')].map(c => c.textContent);
    let commentBlock = '';
    if (activeThemes.length > 0 || comment) {
      commentBlock += '\n\nCommentaire :';
      if (activeThemes.length > 0) commentBlock += '\nThème(s) : ' + activeThemes.join(', ');
      if (comment) commentBlock += '\n' + comment;
    }
    const newsletter = '\n\nNewsletter iSMA Controlli : ' + (rgpd ? '✅ Acceptée' : '❌ Refusée');

    const subject = encodeURIComponent('Demande de documentation iSMA Controlli');
    const body = encodeURIComponent(
      'Bonjour Fabien,\n\nJe souhaite recevoir la documentation pour les références suivantes :\n'
      + productList + coords + commentBlock + newsletter + '\n\nCordialement,'
    );
    window.location.href = 'mailto:fabien.gatti@ismacontrolli.com?subject=' + subject + '&body=' + body;
  }
</script>
